<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#f8f8f8"/>

  <!-- Labels -->
  <text x="250" y="40" text-anchor="middle" font-family="system-ui" font-size="16" fill="#999">App Icon (500x500)</text>
  <text x="850" y="40" text-anchor="middle" font-family="system-ui" font-size="16" fill="#999">Wordmark</text>

  <!-- ==================== -->
  <!-- APP ICON 500x500     -->
  <!-- ==================== -->
  <g transform="translate(0, 60)">
    <!-- Background rounded square -->
    <rect x="0" y="0" width="500" height="500" rx="80" fill="#1a1a2e"/>

    <!-- The mark — centered, white -->
    <!-- ? curve at top, elongated ! stroke, dot below -->
    <g transform="translate(185, 55)">
      <!-- Main stroke: ? hook flowing into ! line -->
      <path d="M 20 65 C 20 20, 110 20, 110 65 C 110 105, 65 115, 65 145 L 65 310"
            stroke="white" stroke-width="28" stroke-linecap="round" fill="none"/>
      <!-- Dot -->
      <circle cx="65" cy="370" r="22" fill="white"/>
    </g>
  </g>

  <!-- ==================== -->
  <!-- WORDMARK             -->
  <!-- ==================== -->
  <g transform="translate(530, 60)">
    <!-- "entend" in clean text, then custom "i" as the logo mark -->

    <!-- entend — using a clean geometric sans-serif style -->
    <text x="0" y="330" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="160" font-weight="300" letter-spacing="-2" fill="#1a1a2e"
          >entend</text>

    <!-- Custom "i" — the logo mark (the "click"), tight against "entend" -->
    <g transform="translate(467, 148)">
      <!-- ? hook → ! stroke, sized to match the x-height of the text -->
      <path d="M 8 28 C 8 10, 42 10, 42 28 C 42 45, 26 49, 26 60 L 26 130"
            stroke="#1a1a2e" stroke-width="10" stroke-linecap="round" fill="none"/>
      <!-- Dot — the tittle of the i, but it's the ?/! dot -->
      <circle cx="26" cy="155" r="8" fill="#1a1a2e"/>
    </g>
  </g>

  <!-- ==================== -->
  <!-- SMALL ICON (64x64)   -->
  <!-- ==================== -->
  <text x="250" y="610" text-anchor="middle" font-family="system-ui" font-size="14" fill="#999">Favicon (64x64)</text>
  <g transform="translate(218, 620)">
    <rect width="64" height="64" rx="12" fill="#1a1a2e"/>
    <g transform="translate(19, 6)">
      <path d="M 3 11 C 3 3, 23 3, 23 11 C 23 19, 13 21, 13 27 L 13 42"
            stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
      <circle cx="13" cy="50" r="4" fill="white"/>
    </g>
  </g>
</svg>
