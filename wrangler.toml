name = "entendi-api"
main = "src/api/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[ai]
binding = "AI"

[triggers]
crons = ["0 8 * * 1"]

[assets]
directory = "public"
run_worker_first = ["/api/*", "/health", "/", "/link", "/login", "/press", "/contact"]
not_found_handling = "none"

# --- Staging environment ---
[env.staging]
name = "entendi-api-staging"
# Secrets: npx wrangler secret put DATABASE_URL --env staging
#          npx wrangler secret put BETTER_AUTH_SECRET --env staging
#          npx wrangler secret put BETTER_AUTH_URL --env staging
[env.staging.vars]
ENVIRONMENT = "staging"

# Uncomment when R2 bucket is configured for backups:
# [[env.staging.r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "entendi-backups-staging"

# --- Production R2 bucket (uncomment when configured) ---
# [[r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "entendi-backups"
