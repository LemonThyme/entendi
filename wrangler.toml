name = "entendi-api"
main = "src/api/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[ai]
binding = "AI"

[triggers]
crons = ["0 8 * * 1"]

[assets]
directory = "public"
run_worker_first = ["/api/*", "/health", "/", "/link", "/press", "/contact"]
not_found_handling = "none"
